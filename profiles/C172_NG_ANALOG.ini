# Octavi IFR-1 profile - AirfoilLabs Cessna 172 NG (analog)
#
# Matched by aircraft file name: C172_NG_ANALOG.acf -> C172_NG_ANALOG.ini
#
# This is a study-level aircraft with simulated avionics:
#   KX165A nav/com radios, KAP140 autopilot, GTX328 transponder, GNS530/430 GPS.
# Unlike the stock C172, its knobs/buttons are driven by the aircraft's OWN
# commands (C172/cockpit/...), so most functions use `type = cmd` (fire a command
# per input) instead of writing stock datarefs. A few instruments (heading bug,
# OBS course, transponder code) still use the stock X-Plane datarefs.
#
# Knob press toggles primary (COM1 COM2 NAV1 NAV2 FMS1 FMS2 AP XPDR) /
# secondary (HDG BARO CRS1 CRS2 FMS1 FMS2 AP MODE).

[meta]
acf = C172_NG_ANALOG.acf

# ---- Primary: KX165A radios ------------------------------------------------
# large knob = MHz (outer), small knob = kHz (inner), SHIFT = active/standby swap.

[COM1]
type       = cmd
large_inc  = C172/cockpit/KX165A/comFrq/outerInc
large_dec  = C172/cockpit/KX165A/comFrq/outerDec
small_inc  = C172/cockpit/KX165A/comFrq/innerInc
small_dec  = C172/cockpit/KX165A/comFrq/innerDec
shift      = C172/cockpit/KX165A/comFrqTransfer

[COM2]
type       = cmd
large_inc  = C172/cockpit/KX165A_2/comFrq/outerInc
large_dec  = C172/cockpit/KX165A_2/comFrq/outerDec
small_inc  = C172/cockpit/KX165A_2/comFrq/innerInc
small_dec  = C172/cockpit/KX165A_2/comFrq/innerDec
shift      = C172/cockpit/KX165A_2/comFrqTransfer

[NAV1]
type       = cmd
large_inc  = C172/cockpit/KX165A/navFrq/outerInc
large_dec  = C172/cockpit/KX165A/navFrq/outerDec
small_inc  = C172/cockpit/KX165A/navFrq/innerInc
small_dec  = C172/cockpit/KX165A/navFrq/innerDec
shift      = C172/cockpit/KX165A/navFrqTransfer

[NAV2]
type       = cmd
large_inc  = C172/cockpit/KX165A_2/navFrq/outerInc
large_dec  = C172/cockpit/KX165A_2/navFrq/outerDec
small_inc  = C172/cockpit/KX165A_2/navFrq/innerInc
small_dec  = C172/cockpit/KX165A_2/navFrq/innerDec
shift      = C172/cockpit/KX165A_2/navFrqTransfer

# ---- Primary: KAP140 autopilot ---------------------------------------------
# Knobs set the KAP140 altitude preselect, EXCEPT when VS mode is active
# (cond_dref non-zero): then the knobs adjust the vertical-speed reference via
# the KAP140 UP/DN keys (+/-100 fpm per detent). Buttons = AP modes.
[AP]
type       = cmd
large_inc  = C172/cockpit/KAP140/knob/outerInc
large_dec  = C172/cockpit/KAP140/knob/outerDec
small_inc  = C172/cockpit/KAP140/knob/innerInc
small_dec  = C172/cockpit/KAP140/knob/innerDec
btn_AP     = C172/cockpit/KAP140/ap
btn_HDG    = C172/cockpit/KAP140/hdg
btn_NAV    = C172/cockpit/KAP140/nav
btn_APR    = C172/cockpit/KAP140/apr
btn_ALT    = C172/cockpit/KAP140/alt
btn_VS     = C172/cockpit/KAP140/arm
# When VS mode is active, the knob drives vertical speed instead of altitude:
cond_dref      = sim/cockpit2/autopilot/vvi_status
cond_large_inc = C172/cockpit/KAP140/up
cond_large_dec = C172/cockpit/KAP140/dn
cond_small_inc = C172/cockpit/KAP140/up
cond_small_dec = C172/cockpit/KAP140/dn

# ---- Primary: transponder code (GTX328 is keypad-based) --------------------
# Best-effort: write the stock X-Plane squawk; the GTX328 display should follow.
[XPDR]
dref = sim/cockpit/radios/transponder_code

# ---- Secondary: heading bug / altimeter / OBS / xpdr mode ------------------
# Heading bug and OBS are the stock X-Plane datarefs (the KAP140/HSI follow them).
# Hold SHIFT (<->) while turning to adjust the directional-gyro drift instead of
# the heading bug (the DG "push & rotate" knob - re-sync to the compass ~every 15
# min). DG_sync_up/down are stock X-Plane commands (the aircraft's own DG knob).
[HDG]
dref           = sim/cockpit/autopilot/heading_mag
coarse_step    = 10
fine_step      = 1
shift_large_inc = sim/instruments/DG_sync_up
shift_large_dec = sim/instruments/DG_sync_down
shift_small_inc = sim/instruments/DG_sync_up
shift_small_dec = sim/instruments/DG_sync_down

[BARO]
cmd_up   = C172/cockpit/pilotAlt/baroPilotInc
cmd_down = C172/cockpit/pilotAlt/baroPilotDec

[CRS1]
dref        = sim/cockpit2/radios/actuators/nav1_obs_deg_mag_pilot
coarse_step = 10
fine_step   = 1

[CRS2]
dref        = sim/cockpit2/radios/actuators/nav2_obs_deg_mag_copilot
coarse_step = 10
fine_step   = 1

# Transponder mode: rotate right = ALT, rotate left = STBY.
[MODE]
cmd_up   = C172/cockpit/GTX328/alt
cmd_down = C172/cockpit/GTX328/stby

# ---- FMS 1 / 2 (GNS530 = unit 1, GNS430 = unit 2) --------------------------
# Knobs use the aircraft's native chapter/page commands; the button presses fall
# back to X-Plane's stock GNS commands (the GNS units are X-Plane's native ones).
# EXPERIMENTAL - if a button does nothing, tell me and we'll find the right command.
[FMS1]
type       = cmd
large_inc  = C172/cockpit/GNS530/chapter_inc
large_dec  = C172/cockpit/GNS530/chapter_dec
small_inc  = C172/cockpit/GNS530/page_inc
small_dec  = C172/cockpit/GNS530/page_dec
knob       = sim/GPS/g430n1_cursor
btn_AP     = sim/GPS/g430n1_cdi
btn_HDG    = sim/GPS/g430n1_obs
btn_NAV    = sim/GPS/g430n1_msg
btn_APR    = sim/GPS/g430n1_fpl
btn_ALT    = sim/GPS/g430n1_vnav
btn_VS     = sim/GPS/g430n1_proc
btn_D      = sim/GPS/g430n1_direct
btn_MENU   = sim/GPS/g430n1_menu
btn_CLR    = sim/GPS/g430n1_clr
btn_ENT    = sim/GPS/g430n1_ent

[FMS2]
type       = cmd
large_inc  = C172/cockpit/GNS430/chapter_inc
large_dec  = C172/cockpit/GNS430/chapter_dec
small_inc  = C172/cockpit/GNS430/page_inc
small_dec  = C172/cockpit/GNS430/page_dec
knob       = sim/GPS/g430n2_cursor
btn_AP     = sim/GPS/g430n2_cdi
btn_HDG    = sim/GPS/g430n2_obs
btn_NAV    = sim/GPS/g430n2_msg
btn_APR    = sim/GPS/g430n2_fpl
btn_ALT    = sim/GPS/g430n2_vnav
btn_VS     = sim/GPS/g430n2_proc
btn_D      = sim/GPS/g430n2_direct
btn_MENU   = sim/GPS/g430n2_menu
btn_CLR    = sim/GPS/g430n2_clr
btn_ENT    = sim/GPS/g430n2_ent

# ---- LED sync (best-effort; KAP140 may not populate autopilot_state) --------
[leds]
ap_state = sim/cockpit/autopilot/autopilot_state
approach = sim/cockpit2/autopilot/approach_status
