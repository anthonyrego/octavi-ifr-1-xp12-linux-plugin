# Octavi IFR-1 - generic fallback profile (stock X-Plane 12 avionics)
#
# Loaded for any aircraft that has NO profile of its own (the plugin looks for
# <acf>.ini first, then falls back to this file). It binds only X-Plane's STOCK
# radio / autopilot / GPS datarefs and commands, which exist on essentially every
# aircraft that uses the built-in avionics stack - so COM/NAV/XPDR/heading/baro/
# OBS/autopilot work out of the box across the default GA fleet (Cessna 172 SP &
# seaplane, Baron 58, Cirrus SR22, etc.).
#
# Bindings an aircraft does not have simply fail to resolve and stay inert (each
# is logged once). The GNS530/430 FMS section below, for example, does nothing on
# a G1000/glass panel - those aircraft get a dedicated <acf>.ini instead.
#
# This is intentionally the lowest common denominator: no aircraft-specific
# quirks (e.g. the 172's g430 nav/com selector lives only in Cessna_172SP.ini).
# To tune a specific aircraft, copy this file to profiles/<acf>.ini and edit it -
# an exact-name match always takes precedence over this fallback.

# ---- Primary: radios -------------------------------------------------------
# large knob = MHz (coarse), small knob = kHz (fine), SHIFT = swap active/standby.
[COM1]
freq_dref  = sim/cockpit/radios/com1_stdby_freq_hz
coarse_min = 11800
coarse_max = 13600
fine_step  = 2.5
flip_cmd   = sim/radios/com1_standy_flip

[COM2]
freq_dref  = sim/cockpit/radios/com2_stdby_freq_hz
coarse_min = 11800
coarse_max = 13600
fine_step  = 2.5
flip_cmd   = sim/radios/com2_standy_flip

[NAV1]
freq_dref  = sim/cockpit/radios/nav1_stdby_freq_hz
coarse_min = 10800
coarse_max = 11700
fine_step  = 5
flip_cmd   = sim/radios/nav1_standy_flip

[NAV2]
freq_dref  = sim/cockpit/radios/nav2_stdby_freq_hz
coarse_min = 10800
coarse_max = 11700
fine_step  = 5
flip_cmd   = sim/radios/nav2_standy_flip

# ---- Primary: transponder code (octal squawk) ------------------------------
[XPDR]
dref = sim/cockpit/radios/transponder_code

# ---- Primary: autopilot ----------------------------------------------------
# large knob = altitude (+/-100 ft), small knob = vertical speed (+/-100 fpm),
# buttons toggle the corresponding AP modes.
[AP]
alt_dref = sim/cockpit/autopilot/altitude
alt_step = 100
vs_dref  = sim/cockpit/autopilot/vertical_velocity
vs_step  = 100
btn_AP   = sim/autopilot/servos_toggle
btn_HDG  = sim/autopilot/heading
btn_NAV  = sim/autopilot/NAV
btn_APR  = sim/autopilot/approach
btn_ALT  = sim/autopilot/altitude_hold
btn_VS   = sim/autopilot/vertical_speed

# ---- Secondary: heading / barometer / courses / transponder mode -----------
[HDG]
dref        = sim/cockpit/autopilot/heading_mag
coarse_step = 10
fine_step   = 1

[BARO]
cmd_up   = sim/instruments/barometer_up
cmd_down = sim/instruments/barometer_down

[CRS1]
dref        = sim/cockpit2/radios/actuators/nav1_obs_deg_mag_pilot
coarse_step = 10
fine_step   = 1

[CRS2]
dref        = sim/cockpit2/radios/actuators/nav2_obs_deg_mag_copilot
coarse_step = 10
fine_step   = 1

[MODE]
cmd_up   = sim/transponder/transponder_up
cmd_down = sim/transponder/transponder_dn

# ---- FMS 1 / 2 (stock GNS530 = FMS1, GNS430 = FMS2) ------------------------
# large knob = chapter, small knob = page, centre knob = cursor; buttons remap to
# CDI/OBS/MSG/FPL/VNAV/PROC/Direct/MENU/CLR/ENT; SHIFT+AP / SHIFT+HDG = zoom.
# Inert on aircraft without the stock GNS units (e.g. G1000 panels).
[FMS1]
chapter_up = sim/GPS/g430n1_chapter_up
chapter_dn = sim/GPS/g430n1_chapter_dn
page_up    = sim/GPS/g430n1_page_up
page_dn    = sim/GPS/g430n1_page_dn
cursor     = sim/GPS/g430n1_cursor
cdi        = sim/GPS/g430n1_cdi
obs        = sim/GPS/g430n1_obs
msg        = sim/GPS/g430n1_msg
fpl        = sim/GPS/g430n1_fpl
vnav       = sim/GPS/g430n1_vnav
proc       = sim/GPS/g430n1_proc
direct     = sim/GPS/g430n1_direct
menu       = sim/GPS/g430n1_menu
clr        = sim/GPS/g430n1_clr
ent        = sim/GPS/g430n1_ent
zoom_in    = sim/GPS/g430n1_zoom_in
zoom_out   = sim/GPS/g430n1_zoom_out

[FMS2]
chapter_up = sim/GPS/g430n2_chapter_up
chapter_dn = sim/GPS/g430n2_chapter_dn
page_up    = sim/GPS/g430n2_page_up
page_dn    = sim/GPS/g430n2_page_dn
cursor     = sim/GPS/g430n2_cursor
cdi        = sim/GPS/g430n2_cdi
obs        = sim/GPS/g430n2_obs
msg        = sim/GPS/g430n2_msg
fpl        = sim/GPS/g430n2_fpl
vnav       = sim/GPS/g430n2_vnav
proc       = sim/GPS/g430n2_proc
direct     = sim/GPS/g430n2_direct
menu       = sim/GPS/g430n2_menu
clr        = sim/GPS/g430n2_clr
ent        = sim/GPS/g430n2_ent
zoom_in    = sim/GPS/g430n2_zoom_in
zoom_out   = sim/GPS/g430n2_zoom_out

# ---- LED sync (stock autopilot state -> AP/HDG/NAV/APR/ALT/VS lamps) --------
[leds]
ap_state = sim/cockpit/autopilot/autopilot_state
approach = sim/cockpit2/autopilot/approach_status
