# Octavi IFR-1 profile - default X-Plane 12 Cessna 172 G1000 (glass cockpit)
#
# Matched by aircraft file name: Cessna_172SP_G1000.acf -> Cessna_172SP_G1000.ini
#
# The G1000 variant shares the analog 172's STOCK avionics backend for almost
# everything: COM/NAV radios, transponder, the GFC700 autopilot (stock AP
# system), heading bug, altimeter setting, OBS course and the autopilot_state
# LED bits are all the same stock datarefs/commands used by _default.ini and the
# analog Cessna_172SP.ini. The ONE thing that differs is the GPS/FMS: there is no
# GNS530/430, so the sim/GPS/g430n* command family does nothing. Instead the two
# integrated displays are driven by the sim/GPS/g1000n* family:
#     g1000n1 = PFD (pilot's primary flight display)
#     g1000n3 = MFD (multi-function display - where most flight-plan/procedure
#                    work is done)
# (g1000n2 is the co-pilot PFD, only present on 3-screen installs.)
#
# This file is a near-copy of _default.ini with [meta] added and FMS1/FMS2
# rebound to the G1000 commands. A full file is required because an exact-name
# match short-circuits the _default.ini fallback - so every stock section is
# repeated here verbatim.
#
# Section names are Octavi functions. The selector knob picks the function;
# pressing the centre knob toggles primary (COM1 COM2 NAV1 NAV2 FMS1 FMS2 AP XPDR)
# / secondary (HDG BARO CRS1 CRS2 FMS1 FMS2 AP MODE).

[meta]
acf = Cessna_172SP_G1000.acf

# ---- Primary: radios -------------------------------------------------------
# large knob = MHz (coarse), small knob = kHz (fine), SHIFT = swap active/standby.
# The G1000 reads/renders the stock standby-frequency datarefs, so writing them
# directly tunes the standby box and the flip command swaps it to active.
[COM1]
freq_dref  = sim/cockpit/radios/com1_stdby_freq_hz
coarse_min = 11800
coarse_max = 13600
fine_step  = 2.5
flip_cmd   = sim/radios/com1_standy_flip

[COM2]
freq_dref  = sim/cockpit/radios/com2_stdby_freq_hz
coarse_min = 11800
coarse_max = 13600
fine_step  = 2.5
flip_cmd   = sim/radios/com2_standy_flip

[NAV1]
freq_dref  = sim/cockpit/radios/nav1_stdby_freq_hz
coarse_min = 10800
coarse_max = 11700
fine_step  = 5
flip_cmd   = sim/radios/nav1_standy_flip

[NAV2]
freq_dref  = sim/cockpit/radios/nav2_stdby_freq_hz
coarse_min = 10800
coarse_max = 11700
fine_step  = 5
flip_cmd   = sim/radios/nav2_standy_flip

# ---- Primary: transponder code (octal squawk) ------------------------------
[XPDR]
dref = sim/cockpit/radios/transponder_code

# ---- Primary: autopilot (GFC700 = stock X-Plane AP) ------------------------
# large knob = altitude (+/-100 ft), small knob = vertical speed (+/-100 fpm),
# buttons toggle the corresponding AP modes.
[AP]
alt_dref = sim/cockpit/autopilot/altitude
alt_step = 100
vs_dref  = sim/cockpit/autopilot/vertical_velocity
vs_step  = 100
btn_AP   = sim/autopilot/servos_toggle
btn_HDG  = sim/autopilot/heading
btn_NAV  = sim/autopilot/NAV
btn_APR  = sim/autopilot/approach
btn_ALT  = sim/autopilot/altitude_hold
btn_VS   = sim/autopilot/vertical_speed

# ---- Secondary: heading / barometer / courses / transponder mode -----------
[HDG]
dref        = sim/cockpit/autopilot/heading_mag
coarse_step = 10
fine_step   = 1

[BARO]
cmd_up   = sim/instruments/barometer_up
cmd_down = sim/instruments/barometer_down

[CRS1]
dref        = sim/cockpit2/radios/actuators/nav1_obs_deg_mag_pilot
coarse_step = 10
fine_step   = 1

[CRS2]
dref        = sim/cockpit2/radios/actuators/nav2_obs_deg_mag_copilot
coarse_step = 10
fine_step   = 1

[MODE]
cmd_up   = sim/transponder/transponder_up
cmd_down = sim/transponder/transponder_dn

# ---- FMS 1 = G1000 PFD, FMS 2 = G1000 MFD ----------------------------------
# large knob = FMS outer (chapter/field group), small knob = FMS inner (page/
# field), centre knob press = CRSR (cursor on/off). Buttons remap to the G1000
# bezel keys: APR=FPL, VS=PROC, D=Direct-To, plus MENU/CLR/ENT. SHIFT+AP /
# SHIFT+HDG = map RANGE in / out. The AP/HDG/NAV/ALT buttons (CDI/OBS/MSG/VNAV
# slots) stay inert - the G1000 has no equivalent bezel commands; CDI source,
# OBS and message ack live on the PFD softkeys, not the FMS knob cluster.
# If RANGE in/out feels reversed, swap zoom_in/zoom_out.
[FMS1]
chapter_up = sim/GPS/g1000n1_fms_outer_up
chapter_dn = sim/GPS/g1000n1_fms_outer_down
page_up    = sim/GPS/g1000n1_fms_inner_up
page_dn    = sim/GPS/g1000n1_fms_inner_down
cursor     = sim/GPS/g1000n1_cursor
fpl        = sim/GPS/g1000n1_fpl
proc       = sim/GPS/g1000n1_proc
direct     = sim/GPS/g1000n1_direct
menu       = sim/GPS/g1000n1_menu
clr        = sim/GPS/g1000n1_clr
ent        = sim/GPS/g1000n1_ent
zoom_in    = sim/GPS/g1000n1_range_down
zoom_out   = sim/GPS/g1000n1_range_up

[FMS2]
chapter_up = sim/GPS/g1000n3_fms_outer_up
chapter_dn = sim/GPS/g1000n3_fms_outer_down
page_up    = sim/GPS/g1000n3_fms_inner_up
page_dn    = sim/GPS/g1000n3_fms_inner_down
cursor     = sim/GPS/g1000n3_cursor
fpl        = sim/GPS/g1000n3_fpl
proc       = sim/GPS/g1000n3_proc
direct     = sim/GPS/g1000n3_direct
menu       = sim/GPS/g1000n3_menu
clr        = sim/GPS/g1000n3_clr
ent        = sim/GPS/g1000n3_ent
zoom_in    = sim/GPS/g1000n3_range_down
zoom_out   = sim/GPS/g1000n3_range_up

# ---- LED sync (stock autopilot state -> AP/HDG/NAV/APR/ALT/VS lamps) --------
# The GFC700 is X-Plane's stock AP, so the legacy autopilot_state bitfield form
# (as used by the analog 172) applies unchanged.
[leds]
ap_state = sim/cockpit/autopilot/autopilot_state
approach = sim/cockpit2/autopilot/approach_status
